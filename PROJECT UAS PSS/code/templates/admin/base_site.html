{% extends "admin/base.html" %}

{% block title %}{{ title }} | {{ site_title|default:_('Django site admin') }}{% endblock %}

{% block branding %}
<h1 id="site-name"><a href="{% url 'admin:index' %}">{{ site_header|default:_('Django administration') }}</a></h1>
{% endblock %}

{% block nav-global %}
{{ block.super }}
<script>
    (function () {
        function hideAdminMessages() {
            // Menargetkan langsung semua kemungkinan pembungkus notifikasi di admin Django
            var messages = document.querySelectorAll('.messagelist, .success, .info, .messagelist li');
            if (messages.length > 0) {
                setTimeout(function () {
                    messages.forEach(function (el) {
                        el.style.transition = "opacity 0.5s ease, max-height 0.5s ease, padding 0.5s ease";
                        el.style.opacity = "0";
                        setTimeout(function () {
                            el.style.display = "none";
                        }, 500);
                    });
                }, 5000); // 5 detik
            }
        }

        // Jalankan langsung saat DOM siap
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', hideAdminMessages);
        } else {
            hideAdminMessages();
        }
    })();
</script>
{% endblock %}
